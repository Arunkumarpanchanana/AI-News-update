name: Daily AI News Email

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:

      - name: Fetch AI News
        run: |
          curl "https://newsapi.org/v2/everything?q=artificial intelligence&sortBy=publishedAt&pageSize=5&apiKey=${{ secrets.NEWS_API_KEY }}" > news.json

      - name: Format News
        run: |
          echo "🚀 AI Updates (Today)" > message.txt
          echo "" >> message.txt

          cat news.json | jq -r '.articles[] | "- \(.title)"' >> message.txt

          echo "" >> message.txt
          echo "⚡ Stay ahead" >> message.txt

      - name: Send Email
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL }}
          password: ${{ secrets.APP_PASSWORD }}
          subject: 🚀 Daily AI Updates
          to: ${{ secrets.EMAIL }}
          from: ${{ secrets.EMAIL }}
          body: file://message.txt
