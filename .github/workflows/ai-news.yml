name: Daily AI News Email

on:
  schedule:
    - cron: "0 4 * * *"   # runs daily
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install jq -y

      - name: Fetch AI News
        run: |
          echo "Fetching news..."

          curl -s \
          "https://newsapi.org/v2/everything?q=AI&sortBy=publishedAt&pageSize=5&language=en&apiKey=${{ secrets.NEWS_API_KEY }}" \
          -o news.json

          echo "----- RESPONSE -----"
          cat news.json

      - name: Validate News Data
        run: |
          STATUS=$(jq -r '.status' news.json)
          echo "API Status: $STATUS"

          if [ "$STATUS" != "ok" ]; then
            echo "⚠️ API failed. Using fallback."
            echo '{"articles":[{"title":"AI news unavailable today"}]}' > news.json
          fi

      - name: Format News
        run: |
          echo "🚀 AI Updates (Today)" > message.txt
          echo "" >> message.txt

          jq -r '.articles[]?.title' news.json | sed 's/^/- /' >> message.txt

          echo "" >> message.txt
          echo "⚡ Stay ahead" >> message.txt

      - name: Send Email via Python
        run: |
          python3 <<EOF
          import smtplib
          from email.mime.text import MIMEText

          with open("message.txt", "r") as f:
              body = f.read()

          msg = MIMEText(body)
          msg["Subject"] = "🚀 Daily AI Updates"
          msg["From"] = "${{ secrets.EMAIL }}"
          msg["To"] = "${{ secrets.EMAIL }}"

          server = smtplib.SMTP_SSL("smtp.gmail.com", 465)
          server.login("${{ secrets.EMAIL }}", "${{ secrets.APP_PASSWORD }}")
          server.send_message(msg)
          server.quit()
          EOF
